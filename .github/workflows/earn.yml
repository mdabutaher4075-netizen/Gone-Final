      - name: Start 9Hits Session
        run: |
          # প্রয়োজনীয় লাইব্রেরি ইনস্টল
          sudo apt-get update
          sudo apt-get install -y libnss3 libgbm1 libasound2
          
          # ভিউয়ার ডাউনলোড এবং এক্সট্রাক্ট
          curl -sL https://9hits.com/downloads/v3/9hits-viewer-linux-x64.tar.bz2 | tar -xj
          cd 9hits-viewer-linux-x64
          chmod +x 9hits-viewer
          
          # আসল সফটওয়্যার রান করা (এটি লিঙ্ক নয়, সরাসরি অ্যাপ)
          ./9hits-viewer --token=08aa8c374e5713f7a572bae472c75cc4 --allow-ca --session=gh_action &
          
          # ৬ ঘণ্টা পর্যন্ত চলতে থাকবে
          sleep 21600
